<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Фото</title>
<style>
    html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: black;
    }

    #photo {
        width: 100vw;
        height: 100vh;
        display: none;
    }

    #start {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        color: white;
        cursor: pointer;
    }
</style>
</head>
<body>

<div id="start">Нажми для просмотра</div>

<img id="photo" src="https://wimg.rule34.xxx//images/2126/f9d650f0830b24c758cb15cb3df158e0.png?17572338">

<script>
document.getElementById("start").addEventListener("click", async () => {
    try {
        await document.documentElement.requestFullscreen();
    } catch {}

    document.getElementById("start").style.display = "none";
    document.getElementById("photo").style.display = "block";
});
</script>

</body>
</html>
